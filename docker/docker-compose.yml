# ML Security RBAC Platform - Docker Compose
# Author: Gabriel Demetrios Lafis

version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ml-security-rbac-api
    ports:
      - "8000:8000"
    environment:
      - AUTH_JWT_SECRET_KEY=change-me-in-production-use-256-bit-secret-key
      - SECURITY_ENVIRONMENT=production
      - SECURITY_DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
